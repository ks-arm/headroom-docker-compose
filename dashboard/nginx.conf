server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ponytail: proxy management API to the mgmt sidecar (same-origin for the SPA)
    location /api/ {
        proxy_pass http://mgmt:8088/api/;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
}
