services:
  headroom-proxy:
    image: ghcr.io/chopratejas/headroom:latest
    container_name: headroom-proxy
    ports:
      - "8787:8787"
    environment:
      - HEADROOM_WORKSPACE_DIR=/workspace
      - HEADROOM_CONFIG_DIR=/config
      - ZAI_API_KEY=${ZAI_API_KEY} 
      - HEADROOM_OUTPUT_SHAPER=1
      # HEADROOM_VERBOSITY_LEVEL intentionally unset → read from /workspace/verbosity.json
      # Route your requests to any OpenAI-compatible backend 
      # - OPENAI_API_KEY=your_key_here
      # - ANTHROPIC_API_KEY=your_key_here
    volumes:
      # ponytail: bind mount so state survives `down -v` and project rename
      - ./data/headroom-workspace:/workspace
      - ./data/headroom-config:/config
      # ponytail: ro mount of Claude Code transcripts so `headroom learn` can read them
      - ${HOME}/.claude/projects:/root/.claude/projects:ro
      # ponytail: ro mount of workspace root so `--project <host-path>` path validation passes
      - /Volumes/External-B:/Volumes/External-B:ro
    restart: unless-stopped
  exporter:
    build: ./exporter
    container_name: headroom-exporter
    environment:
      - HEADROOM_URL=http://host.docker.internal:8787
    restart: unless-stopped
    depends_on:
      - headroom-proxy

  dashboard:
    image: nginx:alpine
    container_name: headroom-dashboard
    ports:
      - "8090:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  mgmt:
    # ponytail: sidecar reusing the headroom image for its python3 + headroom CLI.
    # Not published — only the dashboard nginx reaches it via the compose network.
    image: ghcr.io/chopratejas/headroom:latest
    container_name: headroom-mgmt
    entrypoint: ["python3", "/app/mgmt_server.py"]
    environment:
      - HEADROOM_OUTPUT_SHAPER=1
    volumes:
      - ./data/headroom-workspace:/workspace
      - ./mgmt/mgmt_server.py:/app/mgmt_server.py:ro
      - ${HOME}/.claude/projects:/root/.claude/projects:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8088/api/state',timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    container_name: headroom-dozzle
    ports:
      - "8082:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_FILTER=name=headroom
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: headroom-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    restart: unless-stopped
    depends_on:
      - exporter

  grafana:
    image: grafana/grafana:latest
    container_name: headroom-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_PANELS_DISABLE_SANITIZE_HTML=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
